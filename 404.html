<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>404</title>

    <style>
        @import url('https://fonts.googleapis.com/css?family=Roboto+Mono');

        body {
            margin: 0;
            background: #000;
            font-family: 'Roboto Mono', monospace;
        }

        .center-xy {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .copy-container {
            text-align: center;
            color: #fff;
            font-size: 24px;
        }

        .handle {
            display: inline-block;
            width: 10px;
            height: 28px;
            background: #ffe500;
            margin-left: 5px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {

            0%,
            50%,
            100% {
                opacity: 1;
            }

            25%,
            75% {
                opacity: 0;
            }
        }

        #replay {
            position: absolute;
            bottom: 20px;
            right: 20px;
            cursor: pointer;
            fill: #666;
            width: 30px;
            transition: 0.3s;
        }

        #replay:hover {
            fill: #aaa;
        }
    </style>
</head>

<body>

    <div class="copy-container center-xy">
        <span id="text"></span><span class="handle"></span>
    </div>

    <!-- replay button -->
    <svg id="replay" viewBox="0 0 279.9 297.3">
        <path
            d="M269.4,162.6c-2.7,66.5-55.6,120.1-121.8,123.9c-77,4.4-141.3-60-136.8-136.9C14.7,81.7,71,27.8,140,27.8
    c1.8,0,3.5,0,5.3,0.1c0.3,0,0.5,0.2,0.5,0.5v15c0,1.5,1.6,2.4,2.9,1.7l35.9-20.7c1.3-0.7,1.3-2.6,0-3.3L148.6,0.3
    c-1.3-0.7-2.9,0.2-2.9,1.7v15c0,0.3-0.2,0.5-0.5,0.5c-1.7-0.1-3.5-0.1-5.2-0.1C63.3,17.3,1,78.9,0,155.4
    C-1,233.8,63.4,298.3,141.9,297.3c74.6-1,135.1-60.2,138-134.3c0.1-3-2.3-5.4-5.3-5.4C271.8,157.6,269.5,159.8,269.4,162.6z" />
    </svg>

    <script>
        const text = "404, page not found.";
        const textElement = document.getElementById("text");
        const replayBtn = document.getElementById("replay");

        let index = 0;

        function typeEffect() {
            if (index < text.length) {
                textElement.textContent += text.charAt(index);
                index++;
                setTimeout(typeEffect, 60);
            }
        }

        function restartAnimation() {
            textElement.textContent = "";
            index = 0;
            typeEffect();
        }

        replayBtn.addEventListener("click", restartAnimation);

        // start on load
        typeEffect();
    </script>

</body>

</html>
